<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cognitive Limit System v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              apple: {
                blue: '#0A84FF',
                purple: '#5E5CE6',
                cyan: '#64D2FF',
                bg: '#000000',
                gray: '#98989D',
                text: '#F5F5F7',
                card: '#1C1C1E',
              }
            },
            fontFamily: {
              sans: ['"SF Pro Display"', 'Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
              mono: ['"SF Mono"', '"Fira Code"', 'monospace'],
              sc: ['"Noto Sans SC"', 'sans-serif']
            },
            boxShadow: {
              'glass-sm': '0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2)',
              'glass-md': '0 4px 12px rgba(0,0,0,0.5)',
              'glass-lg': '0 8px 24px rgba(0,0,0,0.6)',
              'glass-xl': '0 16px 48px rgba(0,0,0,0.7)',
              'inner-light': 'inset 0 1px 0 0 rgba(255,255,255,0.1)',
            },
            animation: {
              'blob': 'blob 10s infinite',
              'float': 'float 6s ease-in-out infinite',
              'shimmer': 'shimmer 2s infinite linear',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              shimmer: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' }
              }
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
      
      body {
        background-color: #000000;
        color: #F5F5F7;
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      
      .mesh-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background: 
          radial-gradient(at 0% 0%, hsla(211, 60%, 10%, 1) 0px, transparent 50%),
          radial-gradient(at 100% 0%, hsla(250, 60%, 12%, 1) 0px, transparent 50%),
          radial-gradient(at 100% 100%, hsla(190, 60%, 10%, 1) 0px, transparent 50%),
          radial-gradient(at 0% 100%, hsla(260, 60%, 12%, 1) 0px, transparent 50%);
        filter: blur(40px);
      }

      .mesh-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.4;
        animation: blob 20s infinite alternate;
      }

      .glass-panel {
        background: rgba(28, 28, 30, 0.45);
        backdrop-filter: blur(30px) saturate(180%);
        -webkit-backdrop-filter: blur(30px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.2); 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.3); 
      }

      /* Text Selection */
      ::selection {
        background: rgba(10, 132, 255, 0.3);
        color: #0A84FF;
      }
    </style>
  </head>
  <body>
    <div class="mesh-bg">
      <div class="mesh-blob bg-blue-900/40 w-96 h-96 top-0 -left-20"></div>
      <div class="mesh-blob bg-purple-900/40 w-96 h-96 bottom-0 -right-20 animation-delay-2000"></div>
      <div class="mesh-blob bg-cyan-900/40 w-80 h-80 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 animation-delay-4000"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
